<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emoji-based Song Recommendation</title>
    <style>
        body {
            background: linear-gradient(135deg, #191414 0%, #1db954 100%);
            font-family: 'Circular', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.5s;
        }
        .container {
            background: rgba(25, 20, 20, 0.95);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(30, 50, 30, 0.25);
            padding: 48px 36px 36px 36px;
            margin-top: 80px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        h1 {
            color: #1db954;
            margin-bottom: 18px;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: 2em;
            text-shadow: 0 2px 12px #1db95444;
        }
        label {
            font-size: 1.1em;
            margin-bottom: 12px;
            display: block;
            color: #fff;
        }
        select, button {
            font-size: 1.1em;
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            margin: 8px 0 20px 0;
            outline: none;
        }
        select {
            background: #282828;
            color: #fff;
            border: 1px solid #1db954;
        }
        button {
            background: linear-gradient(90deg, #1db954 0%, #191414 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 8px #1db95444;
            transition: background 0.2s, transform 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #191414 0%, #1db954 100%);
            transform: scale(1.05);
        }
        #result {
            margin-top: 24px;
            text-align: left;
            width: 100%;
        }
        .main-btn-row-container {
            display: flex;
            gap: 32px;
            position: fixed;
            top: 32px;
            right: 36px;
            left: auto;
            z-index: 12;
        }
        .main-btn {
            width: 54px;
            height: 54px;
            background: #191414;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px #1db95444;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            font-size: 2em;
            z-index: 12;
            position: relative;
        }
        .main-btn svg {
            transition: filter 0.2s;
        }
        .main-btn:hover {
            background: #1db954;
            box-shadow: 0 4px 24px #1db95488;
        }
        .main-btn:active svg {
            filter: drop-shadow(0 0 12px #1db954) drop-shadow(0 0 24px #191414);
        }
        .btn-label {
            font-size: 1em;
            margin-top: 12px;
            color: #fff;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.03em;
            display: block;
            animation: spotifyLabelPulse 1.2s infinite alternate;
        }
        @keyframes spotifyLabelPulse {
            0% { color: #fff; text-shadow: 0 0 6px #1db954; }
            100% { color: #1db954; text-shadow: 0 0 16px #1db954; }
        }
        .song-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 18px 16px;
            border-radius: 18px;
            background: #282828;
            box-shadow: 0 2px 8px #1db95422;
            transition: box-shadow 0.2s, background 0.2s;
            animation: fadeInSongRow 0.7s;
        }
        @keyframes fadeInSongRow {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .song-row:hover {
            background: #1db95422;
            box-shadow: 0 4px 16px #1db95444;
        }
        .song-info {
            flex: 1;
            color: #fff;
        }
        .song-info strong {
            color: #1db954;
        }
        .playing .song-info,
        .song-info.playing {
            font-weight: 700;
            font-size: 1.15em;
            color: #191414;
            background: #1db954;
            border-radius: 12px;
            box-shadow: 0 2px 8px #1db95444;
            transition: background 0.3s, color 0.3s;
            animation: playingPulse 1.2s infinite alternate;
        }
        @keyframes playingPulse {
            0% { background: #1db954; color: #191414; }
            100% { background: #191414; color: #1db954; }
        }
        .play-btn {
            background: #191414;
            border: 2px solid #1db954;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3em;
            margin-left: 10px;
            vertical-align: middle;
            color: #1db954;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px #1db95444;
            transition: transform 0.2s, background 0.2s;
        }
        .play-btn:active {
            transform: scale(1.15) rotate(10deg);
            background: #1db954;
            color: #191414;
        }
        .error {
            color: #ff4c4c;
            font-weight: bold;
        }
        .rvit-logo {
            display: block;
            margin: 0 auto 18px auto;
            max-width: 100px;
            border-radius: 18px;
            box-shadow: 0 2px 12px #1db95444;
        }
        #audioPlayer {
            display: none;
            margin-top: 24px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 2px 8px #1db95444;
            background: #282828;
        }
        #songImage {
            display: none;
            width: 220px;
            height: 220px;
            margin: 18px auto 0 auto;
            border-radius: 18px;
            box-shadow: 0 4px 16px #1db95444;
            background: linear-gradient(135deg, #191414 0%, #1db954 100%);
            object-fit: contain;
            padding: 12px;
            transition: background 0.4s;
            animation: songImageGlow 2s infinite alternate;
        }
        @keyframes songImageGlow {
            0% { box-shadow: 0 0 24px 6px #1db954, 0 0 48px 12px #191414; }
            100% { box-shadow: 0 0 32px 12px #191414, 0 0 64px 24px #1db954; }
        }
        .player-controls {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .player-btn {
            padding: 8px 18px;
            border-radius: 12px;
            border: 1px solid #1db954;
            background: #191414;
            color: #1db954;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }
        .player-btn:hover {
            background: #1db954;
            color: #191414;
        }
        ::-webkit-scrollbar {
            width: 8px;
            background: #191414;
        }
        ::-webkit-scrollbar-thumb {
            background: #1db954;
            border-radius: 8px;
        }
        .spotify-play-btn {
            background: none;
            border: none;
            box-shadow: none;
            padding: 0;
            margin-left: 10px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .spotify-play-btn:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px #1db954);
        }
        @media (max-width: 600px) {
            body {
                align-items: stretch;
                padding: 0;
                overflow-x: hidden;
            }
            .container {
                padding: 64px 14px 24px 14px;
                margin: 0;
                max-width: 100vw;
                width: 100%;
                border-radius: 0;
                box-sizing: border-box;
                min-height: 100vh;
                /* Fix zig-zag/jagged frame on mobile */
                -webkit-transform: translateZ(0);
                transform: translateZ(0);
                box-shadow: none;
            }
            h1 {
                font-size: 1.3em;
                margin-bottom: 12px;
            }
            label {
                font-size: 1em;
            }
            select {
                width: 100%;
                box-sizing: border-box;
                font-size: 1em;
                padding: 10px 12px;
            }
            button {
                width: 100%;
                box-sizing: border-box;
                font-size: 1em;
                padding: 12px 14px;
            }
            .rvit-logo {
                max-width: 70px;
                margin-bottom: 12px;
            }
            #songImage {
                width: 150px;
                height: 150px;
                padding: 6px;
                margin-top: 10px;
            }
            .main-btn-row-container {
                top: 10px;
                right: 10px;
                left: auto;
                transform: none;
                gap: 0;
                z-index: 20;
            }
            .main-btn-row-container > div {
                flex-direction: row;
                gap: 6px;
            }
            .main-btn {
                width: 42px;
                height: 42px;
                font-size: 1.2em;
            }
            .main-btn svg {
                width: 20px;
                height: 20px;
            }
            .btn-label {
                display: none;
            }
            #darkModeToggle {
                position: fixed;
                top: 8px;
                left: 8px;
                font-size: 0.85em;
                padding: 6px 12px;
                z-index: 20;
            }
            #prevSongDropdown {
                width: 90vw !important;
                max-width: 280px;
                top: 56px !important;
            }
            .song-row {
                flex-wrap: wrap;
                padding: 14px 12px;
                gap: 8px;
            }
            .song-info {
                font-size: 0.95em;
                min-width: 0;
            }
            .player-controls {
                flex-direction: row;
                gap: 8px;
                flex-wrap: wrap;
            }
            .player-btn {
                flex: 1;
                font-size: 0.95em;
                padding: 8px 10px;
                width: auto;
                height: auto;
            }
            .spotify-play-btn {
                width: 36px;
                height: 36px;
                flex-shrink: 0;
            }
            .spotify-play-btn svg {
                width: 32px;
                height: 32px;
            }
            #audioPlayer {
                width: 100%;
                margin-top: 10px;
            }
        }

        @media (max-width: 380px) {
            .container {
                padding-top: 64px;
            }
            h1 {
                font-size: 1.1em;
            }
            .main-btn {
                width: 38px;
                height: 38px;
            }
            #darkModeToggle {
                font-size: 0.75em;
                padding: 5px 10px;
            }
        }
        .player-inner-hidden {
            display: none !important;
        }
        .history-dropdown {
            top: 70px;
            right: 8px;
            width: 220px;
            z-index: 100;
            display: none;
            font-size: 1em;
            background: #282828;
            color: #1db954;
            border: 2px solid #1db954;
            border-radius: 12px;
            padding: 6px 10px;
        }
        @media (max-width: 600px) {
            .history-dropdown {
                top: 56px;
                right: 8px;
                width: 90vw;
                max-width: 280px;
            }
            /* Fix dark mode button overlapping nav buttons on mobile */
            #darkModeToggle {
                position: fixed !important;
                top: 10px !important;
                left: 10px !important;
                font-size: 0.78em !important;
                padding: 5px 10px !important;
                max-width: 110px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                z-index: 21 !important;
            }
            .main-btn-row-container {
                top: 10px !important;
                right: 10px !important;
                left: auto !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-btn-row-container">
        <div style="display: flex; flex-direction: row; align-items: flex-end;">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <button id="homeBtn" class="main-btn" title="Home" onclick="goHome()">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12L12 3l9 9"/>
                        <path d="M9 21V9h6v12"/>
                    </svg>
                </button>
                <span class="btn-label"><b>Home</b></span>
            </div>
            <div style="width:32px;"></div>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <button id="prevSongBtn" class="main-btn" title="Recently Viewed" onclick="playPreviousListenedSong()">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </button>
                <span class="btn-label"><b>Recently Viewed</b></span>
            </div>
        </div>
    </div>
    <button id="darkModeToggle" onclick="toggleDarkMode()" style="position:fixed;top:32px;left:36px;background:#1db954;color:#191414;border:none;border-radius:18px;padding:8px 18px;font-size:1em;cursor:pointer;z-index:10;transition:background 0.2s, color 0.2s;">🌙 Dark Mode</button>
    <div class="container">
        <img src="/rvit.jpg" alt="RVIT Logo" class="rvit-logo" onerror="this.style.display='none'">
        <h1>🎵 Emoji Song Recommender</h1>
        <label for="emojiSelect">Choose your mood:</label>
        <select id="emojiSelect">
            <option value="">-- Select an emoji --</option>
            <option value="😊">😊</option>
            <option value="😊">😃</option>
            <option value="😊">😄</option>
            <option value="😊">😆</option>
            <option value="😊">🤣</option>
            <option value="😢">😞</option>
            <option value="😢">😿</option>
            <option value="😌">😌</option>
            <option value="😌">😴</option>
            <option value="😌">😇</option>
            <option value="😌">🧘</option>
            <option value="💪">🤩</option>
            <option value="💪">😤</option>
            <option value="💪">🔥</option>
        </select>
        <br>
        <button onclick="getRecommendation()">Get Recommendation</button>
        <div id="playerSection">
            <div id="playerInner" class="player-inner-hidden">
                <img id="songImage" src="" alt="Song Image">
                <audio id="audioPlayer" controls></audio>
                <div id="playerControls" class="player-controls">
                    <button id="prevBtn" onclick="playPrevSong()" class="player-btn">⏮️ Previous</button>
                    <button id="nextBtn" onclick="playNextSong()" class="player-btn">Next ⏭️</button>
                </div>
            </div>
        </div>
        <div id="result"></div>
    </div>
    <script>
        // Backend API base URL.
        // Locally (testing on your PC): "http://127.0.0.1:5000"
        // Deployed (Render backend): "https://ryta-hub-backend.onrender.com" or your equivalent
        const API_BASE = "https://emoji-music-backend.onrender.com";

        let songHistory = [];
        let historyDropdownVisible = false;

        window.addEventListener('DOMContentLoaded', function() {
            const stored = localStorage.getItem('songHistory');
            if (stored) {
                try {
                    songHistory = JSON.parse(stored);
                } catch {}
            }
            updatePrevSongBtn();
        });

        function updatePrevSongBtn() {
            const btn = document.getElementById('prevSongBtn');
            let historyDropdown = document.getElementById('prevSongDropdown');
            if (!historyDropdown) {
                historyDropdown = document.createElement('select');
                historyDropdown.id = 'prevSongDropdown';
                historyDropdown.style.position = 'absolute';
                historyDropdown.className = 'history-dropdown';
                historyDropdown.onchange = function() {
                    const idx = historyDropdown.selectedIndex;
                    if (idx >= 0 && idx < songHistory.length) {
                        const song = songHistory[idx];
                        let safeRowId = song.rowId || 'row0';
                        playSong(song.url, song.imageUrl, 'playBtnPrev', song.mood, safeRowId);
                    }
                };
                btn.parentNode.insertBefore(historyDropdown, btn.nextSibling);
            }
            historyDropdown.innerHTML = '';
            songHistory.forEach((song, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.textContent = `${song.name} (${song.date})`;
                historyDropdown.appendChild(option);
            });
            if (songHistory.length > 0 && historyDropdownVisible) {
                historyDropdown.style.display = 'block';
                historyDropdown.classList.add('show');
            } else {
                historyDropdown.classList.remove('show');
                setTimeout(() => { historyDropdown.style.display = 'none'; }, 350);
            }
        }

        function playPreviousListenedSong() {
            historyDropdownVisible = !historyDropdownVisible;
            updatePrevSongBtn();
        }

        function goHome() {
            const playerInner = document.getElementById('playerInner');
            const resultDiv = document.getElementById('result');
            playerInner.classList.add('player-inner-hidden');
            resultDiv.innerHTML = '';
            document.getElementById('emojiSelect').selectedIndex = 0;
            document.body.style.background = 'linear-gradient(135deg, #191414 0%, #1db954 100%)';
            document.body.classList.remove('motivated', 'relaxed', 'happy', 'sad');
            const songImage = document.getElementById('songImage');
            if (songImage) {
                songImage.style.display = 'none';
                songImage.classList.remove('animated-border', 'happy', 'sad', 'relaxed', 'motivated');
            }
            const audio = document.getElementById('audioPlayer');
            if (audio) {
                audio.pause();
                audio.style.display = 'none';
            }
        }

        function playNextSong() {
            let historyDropdown = document.getElementById('prevSongDropdown');
            if (historyDropdown && historyDropdown.style.display === 'block') {
                if (historyDropdown.selectedIndex < historyDropdown.options.length - 1) {
                    historyDropdown.selectedIndex++;
                    historyDropdown.onchange();
                }
                return;
            }
            if (window.currentSongIdx !== null && window.currentSongList && window.currentSongIdx + 1 < window.currentSongList.length) {
                let nextSong = window.currentSongList[window.currentSongIdx + 1];
                window.currentSongIdx = window.currentSongIdx + 1;
                playSong(nextSong.file_url, nextSong.image_url, 'playBtn' + window.currentSongIdx, nextSong.Mood.toLowerCase(), 'row' + window.currentSongIdx);
            }
        }

        function playPrevSong() {
            let historyDropdown = document.getElementById('prevSongDropdown');
            if (historyDropdown && historyDropdown.style.display === 'block') {
                if (historyDropdown.selectedIndex > 0) {
                    historyDropdown.selectedIndex--;
                    historyDropdown.onchange();
                }
                return;
            }
            if (window.currentSongIdx !== null && window.currentSongIdx > 0) {
                let prevSong = window.currentSongList[window.currentSongIdx - 1];
                playSong(prevSong.file_url, prevSong.image_url, 'playBtn' + (window.currentSongIdx - 1), prevSong.Mood.toLowerCase(), 'row' + (window.currentSongIdx - 1));
            }
        }

        window.currentSongIdx = null;
        window.currentSongList = [];

        function getRecommendation() {
            const emoji = document.getElementById('emojiSelect').value;
            const resultDiv = document.getElementById('result');
            const audio = document.getElementById('audioPlayer');
            const songImage = document.getElementById('songImage');
            audio.style.display = 'none';
            audio.pause();
            songImage.style.display = 'none';
            document.getElementById('playerInner').classList.add('player-inner-hidden');
            resultDiv.innerHTML = '';
            document.body.classList.remove('motivated', 'relaxed', 'happy', 'sad');
            if (!emoji) {
                resultDiv.innerHTML = "<span class='error'>Please select an emoji.</span>";
                return;
            }
            fetch(API_BASE + '/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emoji })
            })
            .then(response => response.json())
            .then(data => {
                window.currentSongList = data.songs;
                if (data.error) {
                    resultDiv.innerHTML = `<span class='error'>${data.error}</span>`;
                } else if (data.songs.length === 0) {
                    resultDiv.innerHTML = "<span class='error'>No songs found for this sentiment.</span>";
                } else {
                    let html = `<h3 style="color:#1db954;">Recommended songs for '${data.sentiment}' mood:</h3><div>`;
                    data.songs.forEach((song, idx) => {
                        html += `<div class='song-row' id='row${idx}'>`;
                        html += `<div class='song-info'><span><strong>${song.Song_Name}</strong> by ${song.Artist} <em>[${song.Genre}, ${song.Mood}]</em></span></div>`;
                        if (song.file_url) {
                            const fileUrl = song.file_url.replace(/'/g, "\\'");
                            const imageUrl = (song.image_url || '').replace(/'/g, "\\'");
                            html += `<button type='button' class='spotify-play-btn' id='playBtn${idx}' onclick='playSong("${fileUrl}", "${imageUrl}", "playBtn${idx}", "${song.Mood.toLowerCase()}", "row${idx}")'>
        <svg height="38" width="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="19" cy="19" r="19" fill="#191414"/>
            <polygon points="15,12 28,19 15,26" fill="#1db954"/>
        </svg>
    </button>`;
                        }
                        html += `</div>`;
                    });
                    html += "</div>";
                    resultDiv.innerHTML = html;
                }
            })
            .catch(() => {
                resultDiv.innerHTML = "<span class='error'>Server error. Is the backend running?</span>";
            });
        }

        function playSong(url, imageUrl, btnId, mood, rowId) {
            // Fix: track current index so Next/Prev buttons work correctly
            const foundIdx = window.currentSongList.findIndex(s => s.file_url === url);
            if (foundIdx !== -1) window.currentSongIdx = foundIdx;

            let songName = '';
            const historyRow = document.getElementById(rowId);
            if (historyRow) {
                const info = historyRow.querySelector('.song-info strong');
                if (info) songName = info.textContent;
            }
            if (!songHistory.some(s => s.url === url)) {
                const now = new Date();
                const dateStr = now.toLocaleString();
                songHistory.push({ url, imageUrl, name: songName, mood, rowId, date: dateStr });
                localStorage.setItem('songHistory', JSON.stringify(songHistory));
                updatePrevSongBtn();
            }
            document.getElementById('playerInner').classList.remove('player-inner-hidden');
            const audio = document.getElementById('audioPlayer');
            const songImage = document.getElementById('songImage');

            // file_url / image_url are now full Cloudinary URLs — use them directly
            audio.src = url;
            audio.style.display = 'block';
            audio.play();

            if (imageUrl) {
                songImage.src = imageUrl;
                songImage.style.display = 'block';
            } else {
                songImage.style.display = 'none';
            }

            document.querySelectorAll('.song-row').forEach(row => {
                row.classList.remove('playing');
                const info = row.querySelector('.song-info');
                if (info) info.classList.remove('playing');
            });
            const btn = document.getElementById(btnId);
            if (btn) {
                btn.classList.remove('animated');
                void btn.offsetWidth;
                btn.classList.add('animated');
            }
            const playRow = document.getElementById(rowId);
            if (playRow) {
                playRow.classList.add('playing');
                const info = playRow.querySelector('.song-info');
                if (info) info.classList.add('playing');
            }
        }

        function pauseSong(rowId) {
            document.getElementById('playerInner').classList.add('player-inner-hidden');
            const audio = document.getElementById('audioPlayer');
            audio.pause();
            document.body.style.background = 'linear-gradient(135deg, #191414 0%, #1db954 100%)';
            const songImage = document.getElementById('songImage');
            songImage.style.display = 'none';
            audio.style.display = 'none';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const btn = document.getElementById('darkModeToggle');
            if (document.body.classList.contains('dark')) {
                btn.innerHTML = '☀️ Light Mode';
                document.body.style.background = 'linear-gradient(135deg, #282828 0%, #1db954 100%)';
            } else {
                btn.innerHTML = '🌙 Dark Mode';
                document.body.style.background = 'linear-gradient(135deg, #191414 0%, #1db954 100%)';
            }
        }
    </script>
</body>
</html>
